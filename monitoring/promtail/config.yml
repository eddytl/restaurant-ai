server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # Use container name as the "service" label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
      # Keep the compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Drop containers without logs
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Try to parse JSON logs (pino output)
      - json:
          expressions:
            level: level
            msg: msg
            err: err
            sessionId: sessionId
            turn: turn
      # Map pino numeric level to string label
      - template:
          source: level
          template: |
            {{ if eq .Value "10" }}trace
            {{ else if eq .Value "20" }}debug
            {{ else if eq .Value "30" }}info
            {{ else if eq .Value "40" }}warn
            {{ else if eq .Value "50" }}error
            {{ else if eq .Value "60" }}fatal
            {{ else }}{{ .Value }}
            {{ end }}
      - labels:
          level:
          service:
          compose_service:
